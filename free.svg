  <rect x="325" y="95" width="270" height="110" rx="16" fill="rgba(13,13,26,0.9)" stroke="rgba(0,255,136,0.15)" stroke-width="1"/>
  <text x="460" y="128" text-anchor="middle" font-size="28">📅</text>
  <text x="460" y="163" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="28" font-weight="900" fill="#00ff88">$50</text>
