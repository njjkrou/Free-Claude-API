      <stop offset="0%" stop-color="#00ff88"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="980" height="320" fill="url(#bg)"/>

  <!-- Grid lines subtle -->
  <line x1="0" y1="160" x2="980" y2="160" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="490" y1="0" x2="490" y2="320" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>

