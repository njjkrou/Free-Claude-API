  <circle cx="860" cy="80" r="3" fill="#3b82f6" opacity="0.4"/>
  <circle cx="30" cy="200" r="2" fill="#8b5cf6" opacity="0.3"/>
  <circle cx="940" cy="240" r="2" fill="#00ff88" opacity="0.3"/>
  <circle cx="150" cy="270" r="1.5" fill="#ec4899" opacity="0.4"/>
  <circle cx="820" cy="260" r="2" fill="#3b82f6" opacity="0.3"/>

