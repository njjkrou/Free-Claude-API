  <text x="490" y="110" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="52" font-weight="900" fill="#e4e4f0" letter-spacing="-2">全球 AI 模型</text>

  <!-- Main title line 2 gradient -->
  <text x="490" y="174" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="52" font-weight="900" fill="url(#textGrad)" letter-spacing="-2">免费统一接入</text>

  <!-- Subtitle -->
  <text x="490" y="215" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="15" fill="#6b7280">一个 API Key，调用 OpenAI、Claude、Gemini、DeepSeek 等</text>
  <text x="490" y="234" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="15" fill="#6b7280">250+ 顶级模型。注册即送额度，无需绑卡，真正零门槛。</text>

  <!-- Register button -->
  <a href="https://api.aifamily.vip/">
