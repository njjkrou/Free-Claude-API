  <rect x="0" y="0" width="980" height="1" fill="rgba(255,255,255,0.06)" rx="1"/>
  <rect x="0" y="89" width="980" height="1" fill="rgba(255,255,255,0.06)" rx="1"/>

  <!-- 250+ -->
