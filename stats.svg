  <text x="474" y="62" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" fill="#6b7280">日请求量</text>

  <line x1="588" y1="20" x2="588" y2="70" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <!-- 99.9% -->
